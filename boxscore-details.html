<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Yesterday's Box Scores</title>

    <style>

        body {
            font-family: "Times New Roman", Times, serif;
            margin: 30px;
        }

        h1 {
            font-size: 1.4em;
            margin-bottom: 25px;
        }

        .boxscore {
            margin-bottom: 40px;
        }

        .headline {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        pre {
            font-family: "Courier New", monospace;
            font-size: 13px;
            line-height: 1.25;
            white-space: pre;
            overflow-x: auto;
        }

    </style>

</head>

<body>

<h1>Yesterday's Box Scores</h1>

<div id="boxscores"></div>

<script>

fetch("./boxscore_details.json")
    .then(response => response.json())
    .then(data => {

        const container =
            document.getElementById("boxscores");

        data.games.forEach(game => {

            const div =
                document.createElement("div");

            div.className = "boxscore";

            div.innerHTML = `
                <div class="headline">${game.headline}</div>
                <pre>${game.boxscore}</pre>
            `;

            container.appendChild(div);

        });

    });

</script>

</body>

</html>
