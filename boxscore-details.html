<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Yesterday's Box Scores</title>

    <style>

        body {
            font-family: "Times New Roman", Times, serif;
            margin: 30px;
        }

        h1 {
            font-size: 1.4em;
            margin-bottom: 25px;
        }

        .boxscore {
            margin-bottom: 40px;
        }

        .headline {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        pre {
            font-family: "Courier New", monospace;
            font-size: 13px;
            line-height: 1.25;
            white-space: pre;
            overflow-x: auto;
        }

    </style>

</head>

<body>

<h1>Yesterday's Box Scores</h1>

<div id="boxscores"></div>

<script>

fetch("./boxscore_details.json")
    .then(response => response.json())
    .then(data => {

        const container =
            document.getElementById("boxscores");

        data.games.forEach(game => {

            const div =
                document.createElement("div");

            div.className = "boxscore";

            let html = `
                <div class="headline">${game.headline}</div>

                <table class="standings-table">
                    <thead>
                        <tr>
                            <th style="text-align:left">Mets Batters</th>
                            <th>AB</th>
                            <th>R</th>
                            <th>H</th>
                            <th>BI</th>
                            <th>BB</th>
                            <th>K</th>
                            <th>AVG</th>
                        </tr>
                    </thead>

                    <tbody>
            `;

            game.away_batting.forEach(player => {

                const isSub =
                    player.order % 100 !== 0;

                html += `
                    <tr>
                        <td style="text-align:left; padding-left:${isSub ? 20 : 0}px">
                            ${player.name} ${player.position}
                        </td>

                        <td>${player.ab}</td>
                        <td>${player.r}</td>
                        <td>${player.h}</td>
                        <td>${player.rbi}</td>
                        <td>${player.bb}</td>
                        <td>${player.k}</td>
                        <td>${player.avg}</td>
                    </tr>
                `;

            });

            html += `
                    </tbody>
                </table>
            `;

            div.innerHTML = html;

            container.appendChild(div);

        });

    });

</script>

</body>

</html>
