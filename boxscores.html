<!DOCTYPE html>
<html>
<head>
    <title>MLB Box Scores</title>

    <style>

        body {
            font-family: "Times New Roman", Times, serif;
            margin: 30px;
        }

        .nav {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .nav a {
            text-decoration: none;
            margin-right: 5px;
        }

        .game {
            margin-bottom: 8px;
        }

        h1 {
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .pitcher-header-row,
        .pitcher-row {
            display: grid;
            grid-template-columns: minmax(180px, 300px) 55px 55px 55px 70px;
            gap: 8px;
        }

        .pitcher-header-row {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .pitcher-row {
            margin-top: 2px;
        }

        .pitcher-name {
            text-align: left;
        }

        .pitcher-stat {
            text-align: right;
        }

        .game-divider {
            border: 0;
            border-top: 1px solid #ccc;
            margin: 8px 0;
        }

        #today-games {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 12px 24px;
        }

        .note {
            margin-top: 10px;
            font-size: 0.9em;
        }

        #games {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 4px 20px;
        }

        #standings-grid {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .league-grid {
            display: grid;
            grid-template-columns: calc(43% - 12px) calc(57% - 12px);
            gap: 24px;
            align-items: start;
        }

        @media (max-width: 900px) {

            .league-grid {
                grid-template-columns: 1fr;
            }

        }

        #standings-grid h2 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1em;
            font-weight: bold;
        }

        .division-title {
            font-weight: bold;
            margin-top: 0px;
            margin-bottom: 0px;
        }

        .division-divider {
            border: none;
            border-top: 1px solid #999;
            margin-top: 0;
            margin-bottom: 2px;
        }

        .standings-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 12px;
            table-layout: fixed;
        }

        .standings-table th,
        .standings-table td {
            padding: 2px 6px;
            font-size: 14px;
            white-space: nowrap;
        }

        .standings-table th {
            font-weight: bold;
            border-bottom: 1px solid #999;
        }

        .standings-table th:first-child,
        .standings-table td:first-child {
            text-align: left;
            width: 14%;
        }

        .standings-table th:not(:first-child),
        .standings-table td:not(:first-child) {
            text-align: right;
        }

        .standings-table th:not(:first-child),
        .standings-table td:not(:first-child) {
            width: 6%;
        }

        @media (max-width: 700px) {

            .standings-table th:first-child,
            .standings-table td:first-child {
                width: 9%;
            }

        }

        .wildcard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .league-title {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1em;
            font-weight: bold;
            border-bottom: 1px solid #999;
            padding-bottom: 4px;
        }

        #standings-grid h2 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1em;
            font-weight: bold;
            border-bottom: 1px solid #999;
            padding-bottom: 4px;
        }

        .leaders-table th {
            border-bottom: none;
        }

        .leader-text {
            font-size: 14px;
            margin: 8px 0;
            line-height: 1.4;
            break-inside: avoid;
            margin-bottom: 12px;
        }

        /* Mobile/default layout */

        .leader-columns {
            column-count: 1;
            column-gap: 24px;
            height: auto;
            overflow: visible;
        }

        /* Desktop only */

        @media (min-width: 901px) {

            .leader-columns {
                column-count: 2;
                column-fill: auto;
                height: 667px;
                overflow: hidden;
            }

        }

        .boxscore {
            margin-bottom: 40px;
        }

        .headline {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .boxscore pre {
            font-family: "Times New Roman", Times, serif;
            font-size: 14px;
            line-height: 1.25;
            white-space: pre;
            overflow-x: auto;
            margin: 0;
        }

        .boxscore-line {
            font-size: 14px;
            line-height: 1.35;
        }

        .boxscore-table {
            border-collapse: collapse;
            width: auto;
            table-layout: fixed;
            margin-bottom: 12px;
        }

        .boxscore-table th,
            .boxscore-table td {
            padding: 2px 4px;
            font-size: 14px;
            white-space: nowrap;
        }

        .boxscore-table th {
            border-bottom: 1px solid #999;
            font-weight: bold;
        }

        .boxscore-table th:first-child,
        .boxscore-table td:first-child {
            width: 90px;
            text-align: left;
        }

        .boxscore-table th:nth-child(2),
        .boxscore-table td:nth-child(2),
        .boxscore-table th:nth-child(3),
        .boxscore-table td:nth-child(3),
        .boxscore-table th:nth-child(4),
        .boxscore-table td:nth-child(4),
        .boxscore-table th:nth-child(5),
        .boxscore-table td:nth-child(5),
        .boxscore-table th:nth-child(6),
        .boxscore-table td:nth-child(6),
        .boxscore-table th:nth-child(7),
        .boxscore-table td:nth-child(7) {
            width: 16px;
            text-align: right;
        }

        .boxscore-table th:nth-child(8),
        .boxscore-table td:nth-child(8) {
            width: 32px;
            text-align: right;
        }

        .boxscore-table .totals-row th,
        .boxscore-table .totals-row td {
            border-top: 1px solid #999;
            border-bottom: 1px solid #999;
            font-weight: bold;
        }

        .game-status {
            font-style: italic;
            color: #666;
            margin: 4px 0 12px 0;
        }

        .linescore-table {
            border-collapse: collapse;
            width: auto;
            margin: 10px 0 18px 0;
            table-layout: fixed;
        }
        
        .linescore-table th,
        .linescore-table td {
            padding: 2px 6px;
            text-align: center;
            white-space: nowrap;
            font-size: 15px;
        }
        
        .linescore-table th:first-child,
        .linescore-table td:first-child {
            text-align: left;
            width: 120px;
            padding-right: 12px;
        }
        
        .linescore-table thead th {
            border-bottom: 1px solid #999;
        }
        
        .linescore-table tbody tr:last-child td {
            border-bottom: 1px solid #999;
        }

        .linescore-divider {
            border-left: 1px solid #999;
        }

    </style>
</head>

<body>

<div class="nav">
    <a href="index.html">Leaderboards</a> |
    <a href="boxscores.html">Box Scores</a>
</div>

<h1>Standings</h1>

<div id="standings-grid">

    <div class="league-grid">

        <div id="al-standings">
            <h2>American League Standings</h2>
        </div>

        <div id="al-leaders">
        </div>

    </div>

    <div class="league-grid">

        <div id="nl-standings">
            <h2>National League Standings</h2>
        </div>

        <div id="nl-leaders">
        </div>

    </div>

</div>

<hr>
    
<h1>Yesterday's Games</h1>

<div id="games"></div>

<hr>

<div class="pitcher-header-row">
    <span>Today's Probable Pitchers</span>
    <span>W-L</span>
    <span>ERA</span>
    <span>K/9</span>
    <span>Team Rec</span>
</div>

<div id="today-games"></div>

<div class="note">
    <em>Team Rec: team's record in games started by today's pitcher</em>
</div>

<hr>

<h2>Yesterday's Box Scores</h2>

<div id="boxscores"></div>

<script>

function createStandingsTable(title, teams, isWildCard = false) {

    let html = `
        <div class="division-title">${title}</div>
        <hr class="division-divider">

        <table class="standings-table ${isWildCard ? 'wildcard-table' : ''}">
            <thead>
                <tr>
                    <th>Team</th>
                    <th>W</th>
                    <th>L</th>
                    <th>Pct</th>
                    <th>${isWildCard ? "WCGB" : "GB"}</th>
                    ${
                        isWildCard
                            ? ""
                            : `
                                <th>L10</th>
                                <th>Strk</th>
                                <th>Home</th>
                                <th>Away</th>
                                <th>1R</th>
                                <th>RD</th>
                              `
                    }
                </tr>
            </thead>
            <tbody>
    `;

    teams.forEach(team => {

        html += `
            <tr>
                <td>${team.city}</td>
                <td>${team.wins}</td>
                <td>${team.losses}</td>
                <td>${team.pct}</td>
                <td>${isWildCard ? team.wcgb : team.gb}</td>
        `;

        if (!isWildCard) {

            html += `
                <td>${team.last10}</td>
                <td>${team.streak}</td>
                <td>${team.home}</td>
                <td>${team.away}</td>
                <td>${team.oneRun}</td>
                <td>${team.runDiff}</td>
            `;

        }

        html += `
            </tr>
        `;

    });

    html += `
            </tbody>
        </table>
    `;

    return html;

}

function createBattingAverageTable(title, players) {

    let html = `
        <table class="standings-table leaders-table">
            <thead>
                <tr>
                    <th>Player</th>
                    <th>G</th>
                    <th>AB</th>
                    <th>R</th>
                    <th>H</th>
                    <th>BA</th>
                </tr>
            </thead>
            <tbody>
    `;

    players.forEach(player => {

        html += `
            <tr>
                <td>${player.player}, ${player.team}</td>
                <td>${player.games}</td>
                <td>${player.ab}</td>
                <td>${player.runs}</td>
                <td>${player.hits}</td>
                <td>${player.avg}</td>
            </tr>
        `;

    });

    html += `
            </tbody>
        </table>
    `;

    return html;

}

function createTextLeaderboard(title, players) {

    const text = players
        .map(player =>
            `${player.player}, ${player.team}, ${player.value}`
        )
        .join("; ");

    return `
        <div class="leader-text">
            <strong>${title}:</strong> ${text}
        </div>
    `;

}

function createWildCardTable(title, teams) {

    const left = teams.slice(0, 6);
    const right = teams.slice(6);

    function buildTable(group) {

        let html = `
            <table class="standings-table">
                <thead>
                    <tr>
                        <th>Team</th>
                        <th>W</th>
                        <th>L</th>
                        <th>Pct</th>
                        <th>GB</th>
                    </tr>
                </thead>
                <tbody>
        `;

        group.forEach(team => {

            html += `
                <tr>
                    <td>${team.city}</td>
                    <td>${team.wins}</td>
                    <td>${team.losses}</td>
                    <td>${team.pct}</td>
                    <td>${team.wcgb}</td>
                </tr>
            `;

        });

        html += `
                </tbody>
            </table>
        `;

        return html;
    }

    return `
        <div class="division-title">${title}</div>
        <hr class="division-divider">

        <div class="wildcard-grid">
            ${buildTable(left)}
            ${buildTable(right)}
        </div>
    `;

}

fetch('./standings.json')
    .then(response => response.json())
    .then(data => {

        const al =
            document.getElementById("al-standings");

        const nl =
            document.getElementById("nl-standings");

        al.innerHTML +=
            createStandingsTable("East Division", data.al.east) +
            createStandingsTable("Central Division", data.al.central) +
            createStandingsTable("West Division", data.al.west) +
            createWildCardTable("Wild Card", data.al.wildcard)

        nl.innerHTML +=
            createStandingsTable("East Division", data.nl.east) +
            createStandingsTable("Central Division", data.nl.central) +
            createStandingsTable("West Division", data.nl.west) +
            createWildCardTable("Wild Card", data.nl.wildcard)

    });

fetch('./leaders.json')
    .then(response => response.json())
    .then(data => {

        const al =
            document.getElementById("al-leaders");

        const nl =
            document.getElementById("nl-leaders");

        al.innerHTML +=

            `<div class="league-title">American League Leaders</div>` +

            `<div class="leader-columns">` +

            createBattingAverageTable(
                "American League Leaders",
                data.al.battingAverage
            ) +

            createTextLeaderboard("Home Runs", data.al.homeRuns) +
            createTextLeaderboard("RBI", data.al.rbi) +
            createTextLeaderboard("Hits", data.al.hits) +
            createTextLeaderboard("Runs", data.al.runs) +
            createTextLeaderboard("Stolen Bases", data.al.stolenBases) +
            createTextLeaderboard("Wins", data.al.wins) +
            createTextLeaderboard("ERA", data.al.era) +
            createTextLeaderboard("Strikeouts", data.al.strikeOuts) +
            createTextLeaderboard("Saves", data.al.saves) +
            createTextLeaderboard("Holds", data.al.holds) +

            `</div>`;

            

        nl.innerHTML +=

            `<div class="league-title">American League Leaders</div>` +

            `<div class="leader-columns">` +

            createBattingAverageTable(
                "National League Leaders",
                data.nl.battingAverage
            ) +

            createTextLeaderboard("Home Runs", data.nl.homeRuns) +
            createTextLeaderboard("RBI", data.nl.rbi) +
            createTextLeaderboard("Hits", data.nl.hits) +
            createTextLeaderboard("Runs", data.nl.runs) +
            createTextLeaderboard("Stolen Bases", data.nl.stolenBases) +
            createTextLeaderboard("Wins", data.nl.wins) +
            createTextLeaderboard("ERA", data.nl.era) +
            createTextLeaderboard("Strikeouts", data.nl.strikeOuts) +
            createTextLeaderboard("Saves", data.nl.saves) +
            createTextLeaderboard("Holds", data.nl.holds) +

            `</div>`;

    });

fetch("./boxscore_details.json")
    .then(response => response.json())
    .then(data => {

        const container =
            document.getElementById("games");

        data.games.forEach(game => {

            const div =
                document.createElement("div");

            div.className = "game";
            div.textContent = game.games_display;

            container.appendChild(div);

        });

    });

fetch("./boxscores.json")
    .then(response => response.json())
    .then(data => {

        const todayContainer =
            document.getElementById("today-games");

        data.today_games.forEach(game => {

            const div =
                document.createElement("div");

            div.className = "game";

            const formattedTime =
                new Date(game.game_time)
                    .toLocaleString(
                        "en-US",
                        {
                            hour: "numeric",
                            minute: "2-digit",
                            hour12: true,
                            timeZone: "America/New_York"
                        }
                    );

            div.innerHTML =
`
<div>
    <strong>${game.away_name} at ${game.home_name}</strong> - ${formattedTime} ET
</div>

<div class="pitcher-row">
    <span>
        ${game.away_pitcher}
        ${game.away_stats ? ` (${game.away_stats.hand})` : ""}
    </span>

    <span>
        ${game.away_stats
            ? `${game.away_stats.wins}-${game.away_stats.losses}`
            : "--"}
    </span>

    <span>
        ${game.away_stats
            ? game.away_stats.era
            : "--"}
    </span>

    <span>
        ${game.away_stats
            ? game.away_stats.k9
            : "--"}
    </span>

    <span>
        ${game.away_stats
            ? game.away_stats.team_record
            : "--"}
    </span>
</div>

<div class="pitcher-row">
    <span>
        ${game.home_pitcher}
        ${game.home_stats ? ` (${game.home_stats.hand})` : ""}
    </span>

    <span>
        ${game.home_stats
            ? `${game.home_stats.wins}-${game.home_stats.losses}`
            : "--"}
    </span>

    <span>
        ${game.home_stats
            ? game.home_stats.era
            : "--"}
    </span>

    <span>
        ${game.home_stats
            ? game.home_stats.k9
            : "--"}
    </span>

    <span>
        ${game.home_stats
            ? game.home_stats.team_record
            : "--"}
    </span>
</div>

<hr class="game-divider">
`;

            todayContainer.appendChild(div);

        });

    });

fetch("./boxscore_details.json")
    .then(response => response.json())
    .then(data => {

        const container =
            document.getElementById("boxscores");

        data.games.forEach(game => {

            if (game.status !== "Final") {
                return;
            }

            const div =
                document.createElement("div");

            div.className = "boxscore";

            let html = `
                <div class="headline">${game.headline}</div>
            `;

                html += `
                <table class="boxscore-table">
                    <thead>
                        <tr>
                            <th style="text-align:left">${game.away.city}</th>
                            <th>AB</th>
                            <th>R</th>
                            <th>H</th>
                            <th>BI</th>
                            <th>BB</th>
                            <th>K</th>
                            <th>AVG</th>
                        </tr>
                    </thead>

                    <tbody>
            `;

            let totals = {
                ab: 0,
                r: 0,
                h: 0,
                rbi: 0,
                bb: 0,
                k: 0
            };

            game.away_batting.forEach(player => {

                const isSub =
                    player.order % 100 !== 0;

                totals.ab += player.ab;
                totals.r += player.r;
                totals.h += player.h;
                totals.rbi += player.rbi;
                totals.bb += player.bb;
                totals.k += player.k;

                html += `
                    <tr>
                        <td style="text-align:left; padding-left:${isSub ? 20 : 0}px">
                            ${player.name} ${player.position}
                        </td>

                        <td>${player.ab}</td>
                        <td>${player.r}</td>
                        <td>${player.h}</td>
                        <td>${player.rbi}</td>
                        <td>${player.bb}</td>
                        <td>${player.k}</td>
                        <td>${player.avg}</td>
                    </tr>
                `;

            });

            html += `
            <tr class="totals-row">
                <th style="text-align:left">Totals</th>
                <th>${totals.ab}</th>
                <th>${totals.r}</th>
                <th>${totals.h}</th>
                <th>${totals.rbi}</th>
                <th>${totals.bb}</th>
                <th>${totals.k}</th>
                <th></th>
            </tr>
            `;

            html += `
                    </tbody>
                </table>
            `;

            totals = {
                ab: 0,
                r: 0,
                h: 0,
                rbi: 0,
                bb: 0,
                k: 0
            };

            html += `
                <table class="boxscore-table">
                    <thead>
                        <tr>
                            <th style="text-align:left">${game.home.city}</th>
                            <th>AB</th>
                            <th>R</th>
                            <th>H</th>
                            <th>BI</th>
                            <th>BB</th>
                            <th>K</th>
                            <th>AVG</th>
                        </tr>
                    </thead>
            
                    <tbody>
            `;
            
            game.home_batting.forEach(player => {
            
                const isSub =
                    player.order % 100 !== 0;
            
                totals.ab += player.ab;
                totals.r += player.r;
                totals.h += player.h;
                totals.rbi += player.rbi;
                totals.bb += player.bb;
                totals.k += player.k;
            
                html += `
                    <tr>
                        <td style="text-align:left; padding-left:${isSub ? 20 : 0}px">
                            ${player.name} ${player.position}
                        </td>
            
                        <td>${player.ab}</td>
                        <td>${player.r}</td>
                        <td>${player.h}</td>
                        <td>${player.rbi}</td>
                        <td>${player.bb}</td>
                        <td>${player.k}</td>
                        <td>${player.avg}</td>
                    </tr>
                `;
            });
            
            html += `
                <tr class="totals-row">
                    <th style="text-align:left">Totals</th>
                    <th>${totals.ab}</th>
                    <th>${totals.r}</th>
                    <th>${totals.h}</th>
                    <th>${totals.rbi}</th>
                    <th>${totals.bb}</th>
                    <th>${totals.k}</th>
                    <th></th>
                </tr>
            `;
            
                        html += `
                                </tbody>
                            </table>
                        `;
            
            // ----- Linescore -----
            
                        html += `
                            <table class="linescore-table">
                                <thead>
                                    <tr>
                                        <th></th>
                        `;
            
                        const innings = Math.max(
                            game.away.innings.length,
                            game.home.innings.length
                        );
            
                        for (let i = 1; i <= innings; i++) {
                            html += `<th>${i}</th>`;
                        }
            
                        html += `
                            <th class="linescore-divider">R</th>
                            <th>H</th>
                            <th>E</th>
                        </tr>
                                </thead>
                                <tbody>
            
                                    <tr>
                                        <td>${game.away.nickname}</td>
                        `;
            
                        for (let i = 0; i < innings; i++) {
                            html += `<td>${game.away.innings[i] ?? ""}</td>`;
                        }
            
                        html += `
                                        <td class="linescore-divider">${game.away.runs}</td>
                                        <td>${game.away.hits}</td>
                                        <td>${game.away.errors}</td>
                                    </tr>
            
                                    <tr>
                                        <td>${game.home.nickname}</td>
                        `;
            
                        for (let i = 0; i < innings; i++) {
                            html += `<td>${game.home.innings[i] ?? ""}</td>`;
                        }
            
                        html += `
                                        <td class="linescore-divider">${game.home.runs}</td>
                                        <td>${game.home.hits}</td>
                                        <td>${game.home.errors}</td>
                                    </tr>
            
                                </tbody>
                            </table>
                        `;
            
            // ----- End Linescore -----
            
                        div.innerHTML = html;
            
                        container.appendChild(div);

        });

    });

</script>

</body>
</html>
