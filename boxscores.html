    <!DOCTYPE html>
<html>
<head>
    <title>MLB Box Scores</title>

    <style>

        body {
            font-family: "Times New Roman", Times, serif;
            margin: 30px;
        }

        .nav {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .nav a {
            text-decoration: none;
            margin-right: 5px;
        }

        .game {
            margin-bottom: 8px;
        }

        h1 {
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .pitcher-header-row,
        .pitcher-row {
            display: grid;
            grid-template-columns: minmax(180px, 300px) 55px 55px 55px 70px;
            gap: 8px;
        }

        .pitcher-header-row {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .pitcher-row {
            margin-top: 2px;
        }

        .pitcher-name {
            text-align: left;
        }

        .pitcher-stat {
            text-align: right;
        }

        .game-divider {
            border: 0;
            border-top: 1px solid #ccc;
            margin: 8px 0;
        }

        #today-games {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 12px 24px;
        }

        .note {
            margin-top: 10px;
            font-size: 0.9em;
        }

        #games {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 4px 20px;
        }

        #standings-grid {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .league-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            align-items: start;
        }

        @media (max-width: 900px) {

            .league-grid {
                grid-template-columns: 1fr;
            }

        }

        @media (max-width: 900px) {

            .leader-columns {
                column-count: 1;
                height: auto !important;
            }

        }

        #standings-grid h2 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1em;
            font-weight: bold;
        }

        .division-title {
            font-weight: bold;
            margin-top: 16px;
            margin-bottom: 2px;
        }

        .division-divider {
            border: none;
            border-top: 1px solid #999;
            margin-top: 0;
            margin-bottom: 8px;
        }

        .standings-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 12px;
            table-layout: fixed;
        }

        .standings-table th,
        .standings-table td {
            padding: 2px 6px;
            font-size: 14px;
            white-space: nowrap;
        }

        .standings-table th {
            font-weight: bold;
            border-bottom: 1px solid #999;
        }

        .standings-table th:first-child,
        .standings-table td:first-child {
            text-align: left;
            width: 22%;
        }

        .standings-table th:not(:first-child),
        .standings-table td:not(:first-child) {
            text-align: right;
        }

        .standings-table th:not(:first-child),
        .standings-table td:not(:first-child) {
            width: 6%;
        }

        @media (max-width: 700px) {

            .standings-table th:first-child,
            .standings-table td:first-child {
                width: 9%;
            }

        }

        .wildcard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .league-title {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1em;
            font-weight: bold;
            border-bottom: 1px solid #999;
            padding-bottom: 4px;
        }

        #standings-grid h2 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1em;
            font-weight: bold;
            border-bottom: 1px solid #999;
            padding-bottom: 4px;
        }

        .leaders-table th {
            border-bottom: none;
        }

        .leader-text {
            margin: 8px 0;
            line-height: 1.4;
        }

        .leader-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: start;
        }

        .leader-column {
            display: flex;
            flex-direction: column;
        }

        .leader-text {
            margin-bottom: 12px;
            line-height: 1.4;
        }

    </style>
</head>

<body>

<div class="nav">
    <a href="index.html">Leaderboards</a> |
    <a href="boxscores.html">Box Scores</a>
</div>

<h1>Standings</h1>

<div id="standings-grid">

    <div class="league-grid">

        <div id="al-standings">
            <h2>American League Standings</h2>
        </div>

        <div id="al-leaders">
        </div>

    </div>

    <div class="league-grid">

        <div id="nl-standings">
            <h2>National League Standings</h2>
        </div>

        <div id="nl-leaders">
        </div>

    </div>

</div>

<hr>
    
<h1>Yesterday's Games</h1>

<div id="games"></div>

<hr>

<div class="pitcher-header-row">
    <span>Today's Probable Pitchers</span>
    <span>W-L</span>
    <span>ERA</span>
    <span>K/9</span>
    <span>Team Rec</span>
</div>

<div id="today-games"></div>

<div class="note">
    <em>Team Rec: team's record in games started by today's pitcher</em>
</div>

<script>

function createStandingsTable(title, teams, isWildCard = false) {

    let html = `
        <div class="division-title">${title}</div>
        <hr class="division-divider">
    `;

    html += `
        <table class="standings-table ${isWildCard ? 'wildcard-table' : ''}">
            <thead>
                <tr>
                    <th>Team</th>
                    <th>W</th>
                    <th>L</th>
                    <th>Pct</th>
                    <th>${isWildCard ? "WCGB" : "GB"}</th>
                    ${
                        isWildCard
                            ? ""
                            : `
                                <th>L10</th>
                                <th>Strk</th>
                                <th>Home</th>
                                <th>Away</th>
                                <th>1R</th>
                                <th>RD</th>
                              `
                    }
                </tr>
            </thead>
            <tbody>
    `;

    teams.forEach(team => {

        html += `
            <tr>
                <td>${team.city}</td>
                <td>${team.wins}</td>
                <td>${team.losses}</td>
                <td>${team.pct}</td>
                <td>${isWildCard ? team.wcgb : team.gb}</td>
        `;

        if (!isWildCard) {

            html += `
                <td>${team.last10}</td>
                <td>${team.streak}</td>
                <td>${team.home}</td>
                <td>${team.away}</td>
                <td>${team.oneRun}</td>
                <td>${team.runDiff}</td>
            `;

        }

        html += `
            </tr>
        `;

    });

    html += `
            </tbody>
        </table>
    `;

    return html;

}

function createBattingAverageTable(title, players) {

    let html = `
        <div class="league-title">${title}</div>

        <div class="division-title">Batting Average</div>

        <table class="standings-table leaders-table">
            <thead>
                <tr>
                    <th>Player</th>
                    <th>G</th>
                    <th>AB</th>
                    <th>R</th>
                    <th>H</th>
                    <th>BA</th>
                </tr>
            </thead>
            <tbody>
    `;

    players.forEach(player => {

        html += `
            <tr>
                <td>${player.player}, ${player.team}</td>
                <td>${player.games}</td>
                <td>${player.ab}</td>
                <td>${player.runs}</td>
                <td>${player.hits}</td>
                <td>${player.avg}</td>
            </tr>
        `;

    });

    html += `
            </tbody>
        </table>
    `;

    return html;

}

function createTextLeaderboard(title, players) {

    const text = players
        .map(player =>
            `${player.player}, ${player.team}, ${player.value}`
        )
        .join("; ");

    return `
        <div class="leader-text">
            <strong>${title}:</strong> ${text}
        </div>
    `;

}

function buildLeaderColumns(containerId, standingsId, leaderData) {

    const container =
        document.getElementById(containerId);

    const standings =
        document.getElementById(standingsId);

    const columns =
        container.querySelector(".leader-columns");

    columns.innerHTML = `
        <div class="leader-column left"></div>
        <div class="leader-column right"></div>
    `;

    const left =
        columns.querySelector(".left");

    const right =
        columns.querySelector(".right");

    const maxHeight =
        standings.offsetHeight -
        container.querySelector(".leaders-table").offsetHeight;

    leaderData.forEach(item => {

        const temp =
            document.createElement("div");

        temp.innerHTML =
            createTextLeaderboard(item.title, item.data);

        const node =
            temp.firstElementChild;

        left.appendChild(node);

        if (left.offsetHeight > maxHeight) {

            left.removeChild(node);

            right.appendChild(node);

        }

    });

}

function createWildCardTable(title, teams) {

    const left = teams.slice(0, 6);
    const right = teams.slice(6);

    function buildTable(group) {

        let html = `
            <table class="standings-table">
                <thead>
                    <tr>
                        <th>Team</th>
                        <th>W</th>
                        <th>L</th>
                        <th>Pct</th>
                        <th>WCGB</th>
                    </tr>
                </thead>
                <tbody>
        `;

        group.forEach(team => {

            html += `
                <tr>
                    <td>${team.city}</td>
                    <td>${team.wins}</td>
                    <td>${team.losses}</td>
                    <td>${team.pct}</td>
                    <td>${team.wcgb}</td>
                </tr>
            `;

        });

        html += `
                </tbody>
            </table>
        `;

        return html;
    }

    return `
        <div class="division-title">${title}</div>
        <hr class="division-divider">

        <div class="wildcard-grid">
            ${buildTable(left)}
            ${buildTable(right)}
        </div>
    `;

}

fetch('./standings.json')
    .then(response => response.json())
    .then(data => {

        const al =
            document.getElementById("al-standings");

        const nl =
            document.getElementById("nl-standings");

        al.innerHTML +=
            createStandingsTable("East Division", data.al.east) +
            createStandingsTable("Central Division", data.al.central) +
            createStandingsTable("West Division", data.al.west) +
            createWildCardTable("Wild Card", data.al.wildcard)

        nl.innerHTML +=
            createStandingsTable("East Division", data.nl.east) +
            createStandingsTable("Central Division", data.nl.central) +
            createStandingsTable("West Division", data.nl.west) +
            createWildCardTable("Wild Card", data.nl.wildcard)

    });

fetch('./leaders.json')
    .then(response => response.json())
    .then(data => {

        const al =
            document.getElementById("al-leaders");

        const nl =
            document.getElementById("nl-leaders");

        al.innerHTML +=
            createBattingAverageTable(
                "American League Leaders",
                data.al.battingAverage
            ) +
            `<div class="leader-columns"></div>`;

        nl.innerHTML +=
            createBattingAverageTable(
                "National League Leaders",
                data.nl.battingAverage
            ) +
            `<div class="leader-columns"></div>`;

        buildLeaderColumns(
            "al-leaders",
            "al-standings",
            [
                { title: "Home Runs", data: data.al.homeRuns },
                { title: "RBI", data: data.al.rbi },
                { title: "Hits", data: data.al.hits },
                { title: "Stolen Bases", data: data.al.stolenBases },
                { title: "Wins", data: data.al.wins },
                { title: "ERA", data: data.al.era },
                { title: "Saves", data: data.al.saves },
                { title: "Holds", data: data.al.holds }
            ]
        );

        buildLeaderColumns(
            "nl-leaders",
            "nl-standings",
            [
                { title: "Home Runs", data: data.nl.homeRuns },
                { title: "RBI", data: data.nl.rbi },
                { title: "Hits", data: data.nl.hits },
                { title: "Stolen Bases", data: data.nl.stolenBases },
                { title: "Wins", data: data.nl.wins },
                { title: "ERA", data: data.nl.era },
                { title: "Saves", data: data.nl.saves },
                { title: "Holds", data: data.nl.holds }
            ]
        );

    });

        // Match leader column heights to standings

        const alStandings =
            document.getElementById("al-standings");

        const alLeaderColumns =
            document.querySelector("#al-leaders .leader-columns");

        alLeaderColumns.style.height =
            alStandings.offsetHeight + "px";


        const nlStandings =
            document.getElementById("nl-standings");

        const nlLeaderColumns =
            document.querySelector("#nl-leaders .leader-columns");

        nlLeaderColumns.style.height =
            nlStandings.offsetHeight + "px";

    });

fetch('./boxscores.json')
    .then(response => response.json())
    .then(data => {

        const container =
            document.getElementById("games");

        data.games.forEach(game => {

            const div =
                document.createElement("div");

            div.className = "game";

            div.innerHTML =
                `${game.winner_name} ${game.winner_score},
                 ${game.loser_name} ${game.loser_score}`;

            container.appendChild(div);

        });

    const todayContainer =
    document.getElementById("today-games");

data.today_games.forEach(game => {

    const div =
        document.createElement("div");

    div.className = "game";

    const formattedTime =
    new Date(game.game_time)
        .toLocaleString(
            "en-US",
            {
                hour: "numeric",
                minute: "2-digit",
                hour12: true,
                timeZone: "America/New_York"
            }
        );

div.innerHTML =
    `
    <div>
        <strong>${game.away_name} at ${game.home_name}</strong> - ${formattedTime} ET
    </div>

<div class="pitcher-row">
    <span>
        ${game.away_pitcher}
        ${game.away_stats ? ` (${game.away_stats.hand})` : ""}
    </span>

    <span>
        ${game.away_stats
            ? `${game.away_stats.wins}-${game.away_stats.losses}`
            : "--"}
    </span>

    <span>
        ${game.away_stats
            ? game.away_stats.era
            : "--"}
    </span>

    <span>
        ${game.away_stats
            ? game.away_stats.k9
            : "--"}
    </span>

    <span>
        ${game.away_stats
            ? game.away_stats.team_record
            : "--"}
    </span>
    
</div>

<div class="pitcher-row">
    <span>
        ${game.home_pitcher}
        ${game.home_stats ? ` (${game.home_stats.hand})` : ""}
    </span>

    <span>
        ${game.home_stats
            ? `${game.home_stats.wins}-${game.home_stats.losses}`
            : "--"}
    </span>

    <span>
        ${game.home_stats
            ? game.home_stats.era
            : "--"}
    </span>

    <span>
        ${game.home_stats
            ? game.home_stats.k9
            : "--"}
    </span>

    <span>
        ${game.home_stats
            ? game.home_stats.team_record
            : "--"}
    </span>
    
</div>

    <hr class="game-divider">
    `;

    todayContainer.appendChild(div);

});

    });

</script>

</body>
</html>
