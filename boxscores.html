<!DOCTYPE html>
<html>
<head>
    <title>MLB Box Scores</title>

    <style>

        body {
            font-family: "Times New Roman", Times, serif;
            margin: 30px;
        }

        .nav {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .nav a {
            text-decoration: none;
            margin-right: 5px;
        }

        .game {
            margin-bottom: 8px;
        }

        h1 {
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .pitcher-header-row,
        .pitcher-row {
            display: grid;
            grid-template-columns: minmax(180px, 300px) 55px 55px 55px 70px;
            gap: 8px;
        }

        .pitcher-header-row {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .pitcher-row {
            margin-top: 2px;
        }

        .pitcher-name {
            text-align: left;
        }

        .pitcher-stat {
            text-align: right;
        }

        .game-divider {
            border: 0;
            border-top: 1px solid #ccc;
            margin: 8px 0;
        }

        #today-games {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 12px 24px;
        }

        .note {
            margin-top: 10px;
            font-size: 0.9em;
        }

        #games {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 4px 20px;
        }

    </style>
</head>

<body>

<div class="nav">
    <a href="index.html">Leaderboards</a> |
    <a href="boxscores.html">Box Scores</a>
</div>

<h1>Yesterday's Games</h1>

<div id="games"></div>

<hr>

<div class="pitcher-header-row">
    <span>Today's Probable Pitchers</span>
    <span>W-L</span>
    <span>ERA</span>
    <span>K/9</span>
    <span>Team Rec</span>
</div>

<div id="today-games"></div>

<div class="note">
    <em>Team Rec: team's record in games started by today's pitcher</em>
</div>

<script>

fetch('./boxscores.json')
    .then(response => response.json())
    .then(data => {

        const container =
            document.getElementById("games");

        data.games.forEach(game => {

            const div =
                document.createElement("div");

            div.className = "game";

            div.innerHTML =
                `${game.winner_name} ${game.winner_score},
                 ${game.loser_name} ${game.loser_score}`;

            container.appendChild(div);

        });

    const todayContainer =
    document.getElementById("today-games");

data.today_games.forEach(game => {

    const div =
        document.createElement("div");

    div.className = "game";

    const formattedTime =
    new Date(game.game_time)
        .toLocaleString(
            "en-US",
            {
                hour: "numeric",
                minute: "2-digit",
                hour12: true,
                timeZone: "America/New_York"
            }
        );

div.innerHTML =
    `
    <div>
        <strong>${game.away_name} at ${game.home_name}</strong> - ${formattedTime} ET
    </div>

<div class="pitcher-row">
    <span>
        ${game.away_pitcher}
        ${game.away_stats ? ` (${game.away_stats.hand})` : ""}
    </span>

    <span>
        ${game.away_stats
            ? `${game.away_stats.wins}-${game.away_stats.losses}`
            : "--"}
    </span>

    <span>
        ${game.away_stats
            ? game.away_stats.era
            : "--"}
    </span>

    <span>
        ${game.away_stats
            ? game.away_stats.k9
            : "--"}
    </span>

    <span>
        ${game.away_stats
            ? game.away_stats.team_record
            : "--"}
    </span>
    
</div>

<div class="pitcher-row">
    <span>
        ${game.home_pitcher}
        ${game.home_stats ? ` (${game.home_stats.hand})` : ""}
    </span>

    <span>
        ${game.home_stats
            ? `${game.home_stats.wins}-${game.home_stats.losses}`
            : "--"}
    </span>

    <span>
        ${game.home_stats
            ? game.home_stats.era
            : "--"}
    </span>

    <span>
        ${game.home_stats
            ? game.home_stats.k9
            : "--"}
    </span>

    <span>
        ${game.home_stats
            ? game.home_stats.team_record
            : "--"}
    </span>
    
</div>

    <hr class="game-divider">
    `;

    todayContainer.appendChild(div);

});

    });

</script>

</body>
</html>
