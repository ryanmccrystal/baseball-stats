<!DOCTYPE html>
<html>
<head>
    <title>MLB Box Scores</title>

    <style>

        body {
            font-family: "Times New Roman", Times, serif;
            margin: 30px;
        }

        .nav {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .nav a {
            text-decoration: none;
            margin-right: 5px;
        }

        .game {
            margin-bottom: 8px;
        }

        h1 {
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 15px;
        }

    </style>
</head>

<body>

<div class="nav">
    <a href="index.html">Leaderboards</a> |
    <a href="boxscores.html">Box Scores</a>
</div>

<h1>Yesterday's Games</h1>

<div id="games"></div>

<hr>

<h1>Today's Probable Pitchers</h1>

<div id="today-games"></div>

<script>

fetch('./boxscores.json')
    .then(response => response.json())
    .then(data => {

        const container =
            document.getElementById("games");

        data.games.forEach(game => {

            const div =
                document.createElement("div");

            div.className = "game";

            div.innerHTML =
                `${game.winner_name} ${game.winner_score},
                 ${game.loser_name} ${game.loser_score}`;

            container.appendChild(div);

        });

    const todayContainer =
    document.getElementById("today-games");

data.today_games.forEach(game => {

    const div =
        document.createElement("div");

    div.className = "game";

    const formattedTime =
    new Date(game.game_time)
        .toLocaleString(
            "en-US",
            {
                hour: "numeric",
                minute: "2-digit",
                hour12: true,
                timeZone: "America/New_York"
            }
        );

div.innerHTML =
    `
    ${formattedTime} ET ${game.away_name} at ${game.home_name}
    <br>
    ${game.away_pitcher}
    <br>
    ${game.home_pitcher}
    <br><br>
    `;

    todayContainer.appendChild(div);

});

    });

</script>

</body>
</html>
