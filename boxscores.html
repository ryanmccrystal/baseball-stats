<!DOCTYPE html>
<html>
<head>
    <title>MLB Box Scores</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap"
          rel="stylesheet">

    <style>

        body {
            font-family: "Source Sans 3", Arial, sans-serif;
            margin: 30px;
        }

        .nav {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .nav a {
            text-decoration: none;
            margin-right: 5px;
        }

        .game {
            margin-bottom: 8px;
        }

        h1 {
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .pitcher-header-row,
        .pitcher-row {
            display: grid;
            grid-template-columns: minmax(180px, 300px) 55px 55px 55px 70px;
            gap: 8px;
        }

        .pitcher-header-row {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .pitcher-row {
            margin-top: 2px;
        }

        .pitcher-name {
            text-align: left;
        }

        .pitcher-stat {
            text-align: right;
        }

        .game-divider {
            border: 0;
            border-top: 1px solid #ccc;
            margin: 8px 0;
        }

        #today-games {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 12px 24px;
        }

        .note {
            margin-top: 10px;
            font-size: 0.9em;
        }

        #games {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 4px 20px;
        }

        #standings-grid {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .league-grid {
            display: grid;
            grid-template-columns: calc(43% - 12px) calc(57% - 12px);
            gap: 24px;
            align-items: start;
        }

        @media (max-width: 900px) {

            .league-grid {
                grid-template-columns: 1fr;
            }

        }

        #standings-grid h2 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1em;
            font-weight: bold;
        }

        .division-title {
            font-weight: bold;
            margin-top: 0px;
            margin-bottom: 0px;
        }

        .division-divider {
            border: none;
            border-top: 1px solid #999;
            margin-top: 0;
            margin-bottom: 2px;
        }

        .standings-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 12px;
            table-layout: fixed;
        }

        .standings-table th,
        .standings-table td {
            padding: 2px 6px;
            font-size: 14px;
            white-space: nowrap;
        }

        .standings-table th {
            font-weight: bold;
            border-bottom: 1px solid #999;
        }

        .standings-table th:first-child,
        .standings-table td:first-child {
            text-align: left;
            width: 14%;
        }

        .standings-table th:not(:first-child),
        .standings-table td:not(:first-child) {
            text-align: right;
        }

        .standings-table th:not(:first-child),
        .standings-table td:not(:first-child) {
            width: 6%;
        }

        @media (max-width: 700px) {

            .standings-table th:first-child,
            .standings-table td:first-child {
                width: 9%;
            }

        }

        .wildcard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .league-title {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1em;
            font-weight: bold;
            border-bottom: 1px solid #999;
            padding-bottom: 4px;
        }

        #standings-grid h2 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1em;
            font-weight: bold;
            border-bottom: 1px solid #999;
            padding-bottom: 4px;
        }

        .leaders-table th {
            border-bottom: none;
        }

        .leader-text {
            font-size: 14px;
            margin: 8px 0;
            line-height: 1.4;
            break-inside: avoid;
            margin-bottom: 12px;
        }

        /* Mobile/default layout */

        .leader-columns {
            column-count: 1;
            column-gap: 24px;
            height: auto;
            overflow: visible;
        }

        /* Desktop only */

        @media (min-width: 901px) {

            .leader-columns {
                column-count: 2;
                column-fill: auto;
                height: 667px;
                overflow: hidden;
            }

        }

        .boxscore {
            flex: 0 0 285px;
            padding: 5px;
            box-sizing: border-box;
        }

        .headline {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 2px;
            padding-bottom: 1px;
            border-bottom: 1px solid #999;
        }

        .boxscore pre {
            font-family: inherit;
            font-size: 14px;
            line-height: 1.25;
            white-space: pre;
            overflow-x: auto;
            margin: 0;
        }

        .boxscore-line {
            font-size: 14px;
            line-height: 1.35;
        }

        .boxscore-table {
            border-collapse: collapse;
            width: 100%;
            table-layout: fixed;
            margin-bottom: 2px;
        }

        .boxscore-table th,
            .boxscore-table td {
            padding: 1px 3px;
            font-size: 14px;
            white-space: nowrap;
        }

        .boxscore-table th {
            border-bottom: 1px solid #999;
            font-weight: bold;
        }

        .boxscore-table th:first-child,
        .boxscore-table td:first-child {
            width: 84px;
            text-align: left;
        }

        .boxscore-table th:nth-child(2),
        .boxscore-table td:nth-child(2),
        .boxscore-table th:nth-child(3),
        .boxscore-table td:nth-child(3),
        .boxscore-table th:nth-child(4),
        .boxscore-table td:nth-child(4),
        .boxscore-table th:nth-child(5),
        .boxscore-table td:nth-child(5),
        .boxscore-table th:nth-child(6),
        .boxscore-table td:nth-child(6),
        .boxscore-table th:nth-child(7),
        .boxscore-table td:nth-child(7) {
            width: 15px;
            text-align: right;
        }

        .boxscore-table th:nth-child(8),
        .boxscore-table td:nth-child(8) {
            width: 30px;
            text-align: right;
        }

        .boxscore-table .totals-row th,
        .boxscore-table .totals-row td {
            border-bottom: 1px solid #999;
            font-weight: bold;
        }

        .game-status {
            font-style: italic;
            color: #666;
            margin: 4px 0 12px 0;
        }

        .linescore-table {
            border-collapse: collapse;
            table-layout: fixed;
            width: 100%;
            margin: 2px 0 2px 0;
        }
        
        .linescore-table th,
        .linescore-table td {
            font-size: 14px;
            white-space: nowrap;
            text-align: center;
            padding: 1px 2px;
            font-weight: normal;
        }
        
        .linescore-table thead th {
            border-bottom: 1px solid #999;
            font-weight: bold;
        }
        
        .linescore-table tbody tr:last-child td {
            border-bottom: 1px solid #999;
        }
        
        .linescore-table th:first-child,
        .linescore-table td:first-child {
            width: 84px;
            text-align: left;
            padding-right: 8px;
        }
        
        .linescore-table th:not(:first-child),
        .linescore-table td:not(:first-child) {
            width: 13px;
        }
        
        .linescore-divider {
            border-left: 1px solid #999;
        }
        
        .linescore-gap {
            width: 8px;
            padding: 0;
            border: none;
        }
        
        .linescore-gap-bottom {
            border-bottom: 1px solid #999;
        }

        .boxscore-content {
            width: 100%;
        }

        #boxscores {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: flex-start;
        }

        .game-notes {
            font-size: 14px;
            line-height: 1.35;
            margin-top: 0px;
            text-align: left;
        }
        
        .game-notes strong {
            font-weight: bold;
        }

        .pitching-table {
            border-collapse: collapse;
            width: 100%;
            table-layout: fixed;
            margin-bottom: 2px;
        }
        
        .pitching-table th,
        .pitching-table td {
            padding: 1px 3px;
            font-size: 14px;
            white-space: nowrap;
        }
        
        .pitching-table th {
            border-bottom: 1px solid #999;
            font-weight: bold;
        }

        .pitching-table th:first-child,
        .pitching-table td:first-child {
            width: 104px;
            text-align: left;
        }
        
        .pitching-table th:nth-child(2),
        .pitching-table td:nth-child(2),
        .pitching-table th:nth-child(3),
        .pitching-table td:nth-child(3),
        .pitching-table th:nth-child(4),
        .pitching-table td:nth-child(4),
        .pitching-table th:nth-child(5),
        .pitching-table td:nth-child(5),
        .pitching-table th:nth-child(6),
        .pitching-table td:nth-child(6),
        .pitching-table th:nth-child(7),
        .pitching-table td:nth-child(7),
        .pitching-table th:nth-child(8),
        .pitching-table td:nth-child(8) {
            width: 14px;
            text-align: right;
        }
        
        .pitching-table th:nth-child(9),
        .pitching-table td:nth-child(9) {
            width: 28px;
            text-align: right;
        }

        .pitching-table th:not(:first-child) {
            text-align: center;
        }
        
        .pitching-table td:not(:first-child) {
            text-align: center;
        }

    </style>
</head>

<body>

<div class="nav">
    <a href="index.html">Leaderboards</a> |
    <a href="boxscores.html">Box Scores</a>
</div>

<h1>Standings</h1>

<div id="standings-grid">

    <div class="league-grid">

        <div id="al-standings">
            <h2>American League Standings</h2>
        </div>

        <div id="al-leaders">
        </div>

    </div>

    <div class="league-grid">

        <div id="nl-standings">
            <h2>National League Standings</h2>
        </div>

        <div id="nl-leaders">
        </div>

    </div>

</div>

<hr>
    
<h1>Yesterday's Games</h1>

<div id="games"></div>

<hr>

<div class="pitcher-header-row">
    <span>Today's Probable Pitchers</span>
    <span>W-L</span>
    <span>ERA</span>
    <span>K/9</span>
    <span>Team Rec</span>
</div>

<div id="today-games"></div>

<div class="note">
    <em>Team Rec: team's record in games started by today's pitcher</em>
</div>

<hr>

<h2>Yesterday's Box Scores</h2>

<div id="boxscores"></div>

<script>

function createStandingsTable(title, teams, isWildCard = false) {

    let html = `
        <div class="division-title">${title}</div>
        <hr class="division-divider">

        <table class="standings-table ${isWildCard ? 'wildcard-table' : ''}">
            <thead>
                <tr>
                    <th>Team</th>
                    <th>W</th>
                    <th>L</th>
                    <th>Pct</th>
                    <th>${isWildCard ? "WCGB" : "GB"}</th>
                    ${
                        isWildCard
                            ? ""
                            : `
                                <th>L10</th>
                                <th>Strk</th>
                                <th>Home</th>
                                <th>Away</th>
                                <th>1R</th>
                                <th>RD</th>
                              `
                    }
                </tr>
            </thead>
            <tbody>
    `;

    teams.forEach(team => {

        html += `
            <tr>
                <td>${team.city}</td>
                <td>${team.wins}</td>
                <td>${team.losses}</td>
                <td>${team.pct}</td>
                <td>${isWildCard ? team.wcgb : team.gb}</td>
        `;

        if (!isWildCard) {

            html += `
                <td>${team.last10}</td>
                <td>${team.streak}</td>
                <td>${team.home}</td>
                <td>${team.away}</td>
                <td>${team.oneRun}</td>
                <td>${team.runDiff}</td>
            `;

        }

        html += `
            </tr>
        `;

    });

    html += `
            </tbody>
        </table>
    `;

    return html;

}

function createBattingAverageTable(title, players) {

    let html = `
        <table class="standings-table leaders-table">
            <thead>
                <tr>
                    <th>Player</th>
                    <th>G</th>
                    <th>AB</th>
                    <th>R</th>
                    <th>H</th>
                    <th>BA</th>
                </tr>
            </thead>
            <tbody>
    `;

    players.forEach(player => {

        html += `
            <tr>
                <td>${player.player}, ${player.team}</td>
                <td>${player.games}</td>
                <td>${player.ab}</td>
                <td>${player.runs}</td>
                <td>${player.hits}</td>
                <td>${player.avg}</td>
            </tr>
        `;

    });

    html += `
            </tbody>
        </table>
    `;

    return html;

}

function createTextLeaderboard(title, players) {

    const text = players
        .map(player =>
            `${player.player}, ${player.team}, ${player.value}`
        )
        .join("; ");

    return `
        <div class="leader-text">
            <strong>${title}:</strong> ${text}
        </div>
    `;

}

function createWildCardTable(title, teams) {

    const left = teams.slice(0, 6);
    const right = teams.slice(6);

    function buildTable(group) {

        let html = `
            <table class="standings-table">
                <thead>
                    <tr>
                        <th>Team</th>
                        <th>W</th>
                        <th>L</th>
                        <th>Pct</th>
                        <th>GB</th>
                    </tr>
                </thead>
                <tbody>
        `;

        group.forEach(team => {

            html += `
                <tr>
                    <td>${team.city}</td>
                    <td>${team.wins}</td>
                    <td>${team.losses}</td>
                    <td>${team.pct}</td>
                    <td>${team.wcgb}</td>
                </tr>
            `;

        });

        html += `
                </tbody>
            </table>
        `;

        return html;
    }

    return `
        <div class="division-title">${title}</div>
        <hr class="division-divider">

        <div class="wildcard-grid">
            ${buildTable(left)}
            ${buildTable(right)}
        </div>
    `;

}

fetch('./standings.json')
    .then(response => response.json())
    .then(data => {

        const al =
            document.getElementById("al-standings");

        const nl =
            document.getElementById("nl-standings");

        al.innerHTML +=
            createStandingsTable("East Division", data.al.east) +
            createStandingsTable("Central Division", data.al.central) +
            createStandingsTable("West Division", data.al.west) +
            createWildCardTable("Wild Card", data.al.wildcard)

        nl.innerHTML +=
            createStandingsTable("East Division", data.nl.east) +
            createStandingsTable("Central Division", data.nl.central) +
            createStandingsTable("West Division", data.nl.west) +
            createWildCardTable("Wild Card", data.nl.wildcard)

    });

fetch('./leaders.json')
    .then(response => response.json())
    .then(data => {

        const al =
            document.getElementById("al-leaders");

        const nl =
            document.getElementById("nl-leaders");

        al.innerHTML +=

            `<div class="league-title">American League Leaders</div>` +

            `<div class="leader-columns">` +

            createBattingAverageTable(
                "American League Leaders",
                data.al.battingAverage
            ) +

            createTextLeaderboard("Home Runs", data.al.homeRuns) +
            createTextLeaderboard("RBI", data.al.rbi) +
            createTextLeaderboard("Hits", data.al.hits) +
            createTextLeaderboard("Runs", data.al.runs) +
            createTextLeaderboard("Stolen Bases", data.al.stolenBases) +
            createTextLeaderboard("Wins", data.al.wins) +
            createTextLeaderboard("ERA", data.al.era) +
            createTextLeaderboard("Strikeouts", data.al.strikeOuts) +
            createTextLeaderboard("Saves", data.al.saves) +
            createTextLeaderboard("Holds", data.al.holds) +

            `</div>`;

            

        nl.innerHTML +=

            `<div class="league-title">American League Leaders</div>` +

            `<div class="leader-columns">` +

            createBattingAverageTable(
                "National League Leaders",
                data.nl.battingAverage
            ) +

            createTextLeaderboard("Home Runs", data.nl.homeRuns) +
            createTextLeaderboard("RBI", data.nl.rbi) +
            createTextLeaderboard("Hits", data.nl.hits) +
            createTextLeaderboard("Runs", data.nl.runs) +
            createTextLeaderboard("Stolen Bases", data.nl.stolenBases) +
            createTextLeaderboard("Wins", data.nl.wins) +
            createTextLeaderboard("ERA", data.nl.era) +
            createTextLeaderboard("Strikeouts", data.nl.strikeOuts) +
            createTextLeaderboard("Saves", data.nl.saves) +
            createTextLeaderboard("Holds", data.nl.holds) +

            `</div>`;

    });

fetch("./boxscore_details.json")
    .then(response => response.json())
    .then(data => {

        const container =
            document.getElementById("games");

        data.games.forEach(game => {

            const div =
                document.createElement("div");

            div.className = "game";
            div.textContent = game.games_display;

            container.appendChild(div);

        });

    });

fetch("./boxscores.json")
    .then(response => response.json())
    .then(data => {

        const todayContainer =
            document.getElementById("today-games");

        data.today_games.forEach(game => {

            const div =
                document.createElement("div");

            div.className = "game";

            const formattedTime =
                new Date(game.game_time)
                    .toLocaleString(
                        "en-US",
                        {
                            hour: "numeric",
                            minute: "2-digit",
                            hour12: true,
                            timeZone: "America/New_York"
                        }
                    );

            div.innerHTML =
`
<div>
    <strong>${game.away_name} at ${game.home_name}</strong> - ${formattedTime} ET
</div>

<div class="pitcher-row">
    <span>
        ${game.away_pitcher}
        ${game.away_stats ? ` (${game.away_stats.hand})` : ""}
    </span>

    <span>
        ${game.away_stats
            ? `${game.away_stats.wins}-${game.away_stats.losses}`
            : "--"}
    </span>

    <span>
        ${game.away_stats
            ? game.away_stats.era
            : "--"}
    </span>

    <span>
        ${game.away_stats
            ? game.away_stats.k9
            : "--"}
    </span>

    <span>
        ${game.away_stats
            ? game.away_stats.team_record
            : "--"}
    </span>
</div>

<div class="pitcher-row">
    <span>
        ${game.home_pitcher}
        ${game.home_stats ? ` (${game.home_stats.hand})` : ""}
    </span>

    <span>
        ${game.home_stats
            ? `${game.home_stats.wins}-${game.home_stats.losses}`
            : "--"}
    </span>

    <span>
        ${game.home_stats
            ? game.home_stats.era
            : "--"}
    </span>

    <span>
        ${game.home_stats
            ? game.home_stats.k9
            : "--"}
    </span>

    <span>
        ${game.home_stats
            ? game.home_stats.team_record
            : "--"}
    </span>
</div>

<hr class="game-divider">
`;

            todayContainer.appendChild(div);

        });

    });

fetch("./boxscore_details.json")
    .then(response => response.json())
    .then(data => {

        const container =
            document.getElementById("boxscores");

        data.games.forEach(game => {

            if (game.status !== "Final") {
                return;
            }

            const div =
                document.createElement("div");

            div.className = "boxscore";

            const content =
                document.createElement("div");
            
            content.className = "boxscore-content";

            let html = `
                <div class="headline">${game.headline}</div>
            `;

                html += `
                <table class="boxscore-table">
                    <thead>
                        <tr>
                            <th style="text-align:left">${game.away.city}</th>
                            <th>AB</th>
                            <th>R</th>
                            <th>H</th>
                            <th>BI</th>
                            <th>BB</th>
                            <th>K</th>
                            <th>AVG</th>
                        </tr>
                    </thead>

                    <tbody>
            `;

            let totals = {
                ab: 0,
                r: 0,
                h: 0,
                rbi: 0,
                bb: 0,
                k: 0
            };

            game.away_batting.forEach(player => {

                const isSub =
                    player.order % 100 !== 0;

                totals.ab += player.ab;
                totals.r += player.r;
                totals.h += player.h;
                totals.rbi += player.rbi;
                totals.bb += player.bb;
                totals.k += player.k;

                html += `
                    <tr>
                        <td style="text-align:left; padding-left:${isSub ? 20 : 0}px">
                            ${player.name} ${player.position}
                        </td>

                        <td>${player.ab}</td>
                        <td>${player.r}</td>
                        <td>${player.h}</td>
                        <td>${player.rbi}</td>
                        <td>${player.bb}</td>
                        <td>${player.k}</td>
                        <td>${player.avg}</td>
                    </tr>
                `;

            });

            html += `
            <tr class="totals-row">
                <th style="text-align:left">Totals</th>
                <th>${totals.ab}</th>
                <th>${totals.r}</th>
                <th>${totals.h}</th>
                <th>${totals.rbi}</th>
                <th>${totals.bb}</th>
                <th>${totals.k}</th>
                <th></th>
            </tr>
            `;

            html += `
                    </tbody>
                </table>
            `;

            totals = {
                ab: 0,
                r: 0,
                h: 0,
                rbi: 0,
                bb: 0,
                k: 0
            };

            html += `
                <table class="boxscore-table">
                    <thead>
                        <tr>
                            <th style="text-align:left">${game.home.city}</th>
                            <th>AB</th>
                            <th>R</th>
                            <th>H</th>
                            <th>BI</th>
                            <th>BB</th>
                            <th>K</th>
                            <th>AVG</th>
                        </tr>
                    </thead>
            
                    <tbody>
            `;
            
            game.home_batting.forEach(player => {
            
                const isSub =
                    player.order % 100 !== 0;
            
                totals.ab += player.ab;
                totals.r += player.r;
                totals.h += player.h;
                totals.rbi += player.rbi;
                totals.bb += player.bb;
                totals.k += player.k;
            
                html += `
                    <tr>
                        <td style="text-align:left; padding-left:${isSub ? 20 : 0}px">
                            ${player.name} ${player.position}
                        </td>
            
                        <td>${player.ab}</td>
                        <td>${player.r}</td>
                        <td>${player.h}</td>
                        <td>${player.rbi}</td>
                        <td>${player.bb}</td>
                        <td>${player.k}</td>
                        <td>${player.avg}</td>
                    </tr>
                `;
            });
            
            html += `
                <tr class="totals-row">
                    <th style="text-align:left">Totals</th>
                    <th>${totals.ab}</th>
                    <th>${totals.r}</th>
                    <th>${totals.h}</th>
                    <th>${totals.rbi}</th>
                    <th>${totals.bb}</th>
                    <th>${totals.k}</th>
                    <th></th>
                </tr>
            `;
            
                        html += `
                                </tbody>
                            </table>
                        `;
            
            // ----- Linescore -----
            
                        html += `
                            <table class="linescore-table">
                                <tbody>
            
                                    <tr>
                                        <td>${game.away.city}</td>
                        `;

                        const innings = Math.max(
                            game.away.innings.length,
                            game.home.innings.length
                        );
            
                        for (let i = 0; i < innings; i++) {

                            html += `<td>${game.away.innings[i] ?? ""}</td>`;
                        
                            if (i === 2 || i === 5) {
                                html += `<td class="linescore-gap"></td>`;
                            }
                        
                        }
            
                        html += `
                                        <td class="linescore-divider">${game.away.runs}</td>
                                        <td>${game.away.hits}</td>
                                        <td>${game.away.errors}</td>
                                    </tr>
            
                                    <tr>
                                        <td>${game.home.city}</td>
                        `;
            
                        for (let i = 0; i < innings; i++) {

                            html += `<td>${game.home.innings[i] ?? ""}</td>`;
                        
                            if (i === 2 || i === 5) {
                                html += `<td class="linescore-gap linescore-gap-bottom"></td>`;
                            }
                        
                        }
            
                        html += `
                                        <td class="linescore-divider">${game.home.runs}</td>
                                        <td>${game.home.hits}</td>
                                        <td>${game.home.errors}</td>
                                    </tr>
            
                                </tbody>
                            </table>
                        `;
            
            // ----- End Linescore -----

            // -----------------------------
            // Game Notes
            // -----------------------------
            
            let notes = [];
            
            if (game.notes.errors.length) {
                notes.push(
                    `<strong>E:</strong> ${game.notes.errors.join(", ")}.`
                );
            }
            
            if (game.notes.lob) {
                const teams = Object.entries(game.notes.lob);
            
                notes.push(
                    `<strong>LOB:</strong> ${teams[0][0]} ${teams[0][1]}, ${teams[1][0]} ${teams[1][1]}.`
                );
            }
            
            if (game.notes.doubles.length) {
                notes.push(
                    `<strong>2B:</strong> ${game.notes.doubles.join(", ")}.`
                );
            }
            
            if (game.notes.triples.length) {
                notes.push(
                    `<strong>3B:</strong> ${game.notes.triples.join(", ")}.`
                );
            }
            
            if (game.notes.home_runs.length) {
                notes.push(
                    `<strong>HR:</strong> ${game.notes.home_runs.join(", ")}.`
                );
            }
            
            if (game.notes.stolen_bases.length) {
                notes.push(
                    `<strong>SB:</strong> ${game.notes.stolen_bases.join(", ")}.`
                );
            }
            
            if (game.notes.caught_stealing.length) {
                notes.push(
                    `<strong>CS:</strong> ${game.notes.caught_stealing.join(", ")}.`
                );
            }
            
            if (game.notes.gidp.length) {
                notes.push(
                    `<strong>GIDP:</strong> ${game.notes.gidp.join(", ")}.`
                );
            }
            
            if (game.notes.sac_hits.length) {
                notes.push(
                    `<strong>SH:</strong> ${game.notes.sac_hits.join(", ")}.`
                );
            }
            
            if (game.notes.sac_flies.length) {
                notes.push(
                    `<strong>SF:</strong> ${game.notes.sac_flies.join(", ")}.`
                );
            }
            
            if (notes.length) {
            
                html += `
                    <div class="game-notes">
                        ${notes.join(" ")}
                    </div>
                `;
            }

            // End game notes
            // -----------------------------

            // -----------------------------
            // Away Pitching
            // -----------------------------
            
            html += `
                <table class="pitching-table">
                    <thead>
                        <tr>
                            <th style="text-align:left">${game.away.city}</th>
                            <th>IP</th>
                            <th>H</th>
                            <th>R</th>
                            <th>ER</th>
                            <th>BB</th>
                            <th>K</th>
                            <th>NP</th>
                            <th>ERA</th>
                        </tr>
                    </thead>
            
                    <tbody>
            `;
            
            game.away_pitching.forEach(player => {
            
                html += `
                    <tr>
            
                        <td style="text-align:left">
                            ${player.name}
                        </td>
            
                        <td>${player.ip}</td>
                        <td>${player.h}</td>
                        <td>${player.r}</td>
                        <td>${player.er}</td>
                        <td>${player.bb}</td>
                        <td>${player.k}</td>
                        <td>${player.np}</td>
                        <td>${player.era}</td>
            
                    </tr>
                `;
            
            });
            
            html += `
                    </tbody>
                </table>
            `;

            // -----------------------------
            // Home Pitching
            // -----------------------------
            
            html += `
                <table class="pitching-table">
                    <thead>
                        <tr>
                            <th style="text-align:left">${game.home.city}</th>
                            <th>IP</th>
                            <th>H</th>
                            <th>R</th>
                            <th>ER</th>
                            <th>BB</th>
                            <th>K</th>
                            <th>NP</th>
                            <th>ERA</th>
                        </tr>
                    </thead>
            
                    <tbody>
            `;
            
            game.home_pitching.forEach(player => {
            
                html += `
                    <tr>
            
                        <td style="text-align:left">
                            ${player.name}
                        </td>
            
                        <td>${player.ip}</td>
                        <td>${player.h}</td>
                        <td>${player.r}</td>
                        <td>${player.er}</td>
                        <td>${player.bb}</td>
                        <td>${player.k}</td>
                        <td>${player.np}</td>
                        <td>${player.era}</td>
            
                    </tr>
                `;
            
            });
            
            html += `
                    </tbody>
                </table>
            `;
            
                        content.innerHTML = html;

                        div.appendChild(content);
                        
                        container.appendChild(div);

        });

    });

</script>

</body>
</html>
