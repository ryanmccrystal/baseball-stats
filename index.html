<!DOCTYPE html>
<html>
<head>
    <title>MLB Leaderboards</title>

    <style>

        body {
            font-family: "Times New Roman", Times, serif;
            margin: 30px;
        }

        h1 {
            margin-bottom: 25px;
        }

        h2 {
    margin-top: 20px;
    margin-bottom: 15px;
}

hr {
    margin-top: 30px;
    margin-bottom: 30px;
}

        .grid {
            display: grid;
            grid-template-columns:
                repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            padding: 10px;
        }

        .title {
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px solid black;
            padding-bottom: 4px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        .player {
            margin-right: 10px;
        }

        .value {
            white-space: nowrap;
        }

    </style>
</head>

<body>

<h1>American League Leaders</h1>

<h2>Hitting</h2>

<div id="hitting" class="grid"></div>

<hr>

<h2>Pitching</h2>

<div id="pitching" class="grid"></div>

<script>

fetch('./leaderboards.json')
    .then(response => response.json())
    .then(data => {

        const hittingTitles = {
            batting_avg: "AL Batting Avg",
            home_runs: "AL Home Runs",
            rbi: "AL RBI",
            stolen_bases: "AL Stolen Bases",
            obp: "AL On-Base %",
            slg: "AL SLG",
            ops: "AL OPS",
            runs: "AL Runs",
            hits: "AL Hits",
            doubles: "AL Doubles",
            triples: "AL Triples",
            xbh: "AL XBH"
        };

        const pitchingTitles = {
            era: "AL ERA",
            wins: "AL Wins",
            strikeouts: "AL Strikeouts",
            whip: "AL WHIP",
            innings: "AL IP",
            saves: "AL Saves",
            holds: "AL Holds"
        };

        function buildSection(containerId, titles, dataGroup) {

            const container =
                document.getElementById(containerId);

            Object.keys(titles).forEach(key => {

                const card =
                    document.createElement("div");

                card.className = "card";

                let html =
                    `<div class="title">${titles[key]}</div>`;

                dataGroup[key].forEach(player => {

                    html += `
                        <div class="row">
                            <span class="player">
                                ${player.name}, ${player.team}
                            </span>

                            <span class="value">
                                ${player.value}
                            </span>
                        </div>
                    `;
                });

                card.innerHTML = html;

                container.appendChild(card);

            });
        }

        buildSection(
            "hitting",
            hittingTitles,
            data.hitting
        );

        buildSection(
            "pitching",
            pitchingTitles,
            data.pitching
        );

    });

</script>

</body>
</html>
