<!DOCTYPE html>
<html>
<head>
    <title>MLB Leaderboards</title>

    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            margin: 40px;
        }

        h2 {
            margin-bottom: 15px;
        }

        table {
            border-collapse: collapse;
        }

        th, td {
            padding: 4px 20px 4px 0;
        }

        th {
            text-align: left;
            border-bottom: 1px solid black;
        }

        td:last-child,
        th:last-child {
            text-align: right;
        }
    </style>
</head>

<body>

<h2>AL Batting Avg</h2>

<table id="leaders">
    <thead>
        <tr>
            <th>Player</th>
            <th>Team</th>
            <th>AVG</th>
        </tr>
    </thead>

    <tbody>
    </tbody>
</table>

<script>
fetch('./al_batting_avg.json')
    .then(response => response.json())
    .then(data => {

        let tbody = document.querySelector("#leaders tbody");

        data.forEach(player => {

            let row = document.createElement("tr");

            row.innerHTML = `
                <td>${player.name}</td>
                <td>${player.team}</td>
                <td>${player.avg}</td>
            `;

            tbody.appendChild(row);
        });
    });
</script>

</body>
</html>
