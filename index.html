<!DOCTYPE html>
<html>
<head>
    <title>MLB Leaderboards</title>

    <div class="nav">
    <a href="#standings">Standings</a> |
    <a href="#al-hitting">AL Hitting</a> |
    <a href="#al-pitching">AL Pitching</a> |
    <a href="#nl-hitting">NL Hitting</a> |
    <a href="#nl-pitching">NL Pitching</a> 

</div>

    <style>

        body {
            font-family: "Times New Roman", Times, serif;
            margin: 30px;
        }

        h1 {
            margin-bottom: 25px;
        }

        #lastUpdated {
    margin-bottom: 20px;
    font-style: italic;
}

        h2 {
    margin-top: 20px;
    margin-bottom: 15px;
}

hr {
    margin-top: 30px;
    margin-bottom: 30px;
}

        .major-divider {
    margin-top: 50px;
    margin-bottom: 50px;
    border-top: 3px solid black;
}

        .grid {
            display: grid;
            grid-template-columns:
                repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            padding: 10px;
        }

        .title {
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px solid black;
            padding-bottom: 4px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        .player {
            margin-right: 10px;
        }

        .value {
            white-space: nowrap;
        }

    </style>
</head>

<body>

<h1>American League Leaders</h1>
   
<div id="lastUpdated"></div>

<h2>American League Hitting</h2>

<div id="al-hitting" class="grid"></div>

<hr>

<h2>American League Pitching</h2>

<div id="al-pitching" class="grid"></div>

<hr class="major-divider">

<h2>National League Hitting</h2>

<div id="nl-hitting" class="grid"></div>

<hr>

<h2>National League Pitching</h2>

<div id="nl-pitching" class="grid"></div>

<script>

fetch('./leaderboards.json')
    .then(response => response.json())
     .then(data => {

        document.getElementById("lastUpdated")
            .textContent =
            "Last Updated: " +
            data.last_updated;

        const hittingTitles = {
            batting_avg: "Batting Avg",
            home_runs: "Home Runs",
            rbi: "RBI",
            stolen_bases: "Stolen Bases",
            obp: "On-Base %",
            slg: "SLG",
            ops: "OPS",
            runs: "Runs",
            hits: "Hits",
            doubles: "Doubles",
            triples: "Triples",
            xbh: "XBH"
        };

        const pitchingTitles = {
            era: "ERA",
            wins: "Wins",
            strikeouts: "Strikeouts",
            whip: "WHIP",
            innings: "IP",
            home_runs_allowed: "HR Allowed",
            saves: "Saves",
            holds: "Holds"
        };

        function buildSection(containerId, titles, dataGroup) {

            const container =
                document.getElementById(containerId);

            Object.keys(titles).forEach(key => {

                const card =
                    document.createElement("div");

                card.className = "card";

                let html =
                    `<div class="title">${titles[key]}</div>`;

                dataGroup[key].forEach(player => {

                    html += `
                        <div class="row">
                            <span class="player">
                                ${player.name}, ${player.team}
                            </span>

                            <span class="value">
                                ${player.value}
                            </span>
                        </div>
                    `;
                });

                card.innerHTML = html;

                container.appendChild(card);

            });
        }

        buildSection(
    "al-hitting",
    hittingTitles,
    data.al.hitting
);

buildSection(
    "al-pitching",
    pitchingTitles,
    data.al.pitching
);

buildSection(
    "nl-hitting",
    hittingTitles,
    data.nl.hitting
);

buildSection(
    "nl-pitching",
    pitchingTitles,
    data.nl.pitching
);

    });

</script>

</body>
</html>
