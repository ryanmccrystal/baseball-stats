<!DOCTYPE html>
<html>
<head>
    <title>MLB Leaderboards</title>

    <style>

        body {
            font-family: "Times New Roman", Times, serif;
            margin: 30px;
        }

        h1 {
            margin-bottom: 25px;
        }

        .grid {
            display: grid;
            grid-template-columns:
                repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            padding: 10px;
        }

        .title {
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px solid black;
            padding-bottom: 4px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        .player {
            margin-right: 10px;
        }

        .value {
            white-space: nowrap;
        }

    </style>
</head>

<body>

<h1>American League Leaders</h1>

<div id="leaderboards" class="grid"></div>

<script>

const TITLES = {
    batting_avg: "AL Batting Avg",
    home_runs: "AL Home Runs",
    rbi: "AL RBI",
    stolen_bases: "AL Stolen Bases",
    obp: "AL On-Base %",
    slg: "AL SLG",
    ops: "AL OPS",
    runs: "AL Runs",
    hits: "AL Hits",
    doubles: "AL Doubles",
    triples: "AL Triples",
    xbh: "AL XBH"
};

fetch('./leaderboards.json')
    .then(response => response.json())
    .then(data => {

        const container =
            document.getElementById("leaderboards");

        const hitting = data.hitting;

        Object.keys(TITLES).forEach(key => {

            const card =
                document.createElement("div");

            card.className = "card";

            let html =
                `<div class="title">${TITLES[key]}</div>`;

            hitting[key].forEach(player => {

                html += `
                    <div class="row">
                        <span class="player">
                            ${player.name}, ${player.team}
                        </span>

                        <span class="value">
                            ${player.value}
                        </span>
                    </div>
                `;
            });

            card.innerHTML = html;

            container.appendChild(card);

        });

    });

</script>

</body>
</html>
