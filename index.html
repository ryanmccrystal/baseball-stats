<!DOCTYPE html>
<html>
<head>
    <title>MLB Leaderboards</title>

    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            margin: 40px;
        }

        h2 {
            margin-bottom: 15px;
        }

        .leaderboard {
            width: 450px;
        }

        .player-row {
            display: flex;
            margin-bottom: 4px;
        }

        .name {
            width: 220px;
        }

        .avg {
            width: 50px;
            text-align: right;
        }

        .name {
            text-align: left;
        }

        .avg {
            text-align: right;
            min-width: 50px;
        }
    </style>
</head>

<body>

<h2>AL Batting Avg</h2>

<div id="leaders" class="leaderboard"></div>

<script>
fetch('./al_batting_avg.json')
    .then(response => response.json())
    .then(data => {

        let leaders = document.getElementById("leaders");

        data.forEach(player => {

            let row = document.createElement("div");
            row.className = "player-row";

            row.innerHTML = `
                <span class="name">${player.name}, ${player.team}</span>
                <span class="avg">${player.avg}</span>
            `;

            leaders.appendChild(row);
        });
    });
</script>

</body>
</html>
